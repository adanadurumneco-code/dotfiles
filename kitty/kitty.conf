# --- Kısayollar ---
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+q close_window

# --- Yazı Tipi ---
font_family      HurmitNerdFont
font_size        9.0

# --- Görünüm ve Şeffaflık ---
# Şeffaflığı resimdeki netlik için biraz artırdım (0.85). 
# Eğer çok şeffaf gelirse 0.90 yapabilirsin.
background_opacity         0.85
background_blur            1
dynamic_background_opacity yes

# Arka Plan ve Metin
background            #24273a
foreground            #cad3f5
selection_background  #f4dbd6
selection_foreground  #24273a

# Cursor (İmleç)
cursor                #f4dbd6
cursor_text_color     #24273a

# URL Renkleri
url_color             #f4dbd6

# Terminal Renk Paleti (Pastel Tonlar)

# Siyah (Black)
color0 #494d64
color8 #5b6078

# Kırmızı (Red)
color1 #ed8796
color9 #ed8796

# Yeşil (Green)
color2  #a6da95
color10 #a6da95

# Sarı (Yellow)
color3  #eed49f
color11 #eed49f

# Mavi (Blue)
color4  #8aadf4
color12 #8aadf4

# Macenta (Magenta)
color5  #f5bde6
color13 #f5bde6

# Turkuaz (Cyan)
color6  #8bd5ca
color14 #8bd5ca

# Beyaz (White)
color7  #b8c0e0
color15 #a5adcb
# --- Pencere ve Dekorasyon ---
hide_window_decorations yes
draw_minimal_borders    yes
window_border_width     0
active_border_color     none
window_padding_width    10
window_margin_width     0

# --- Sistem Ayarları ---
linux_display_server    wayland